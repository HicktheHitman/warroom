<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CALLSIGN: WARROOM — Intel Hub</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-logo">
    <div class="topbar-logo-name">WARROOM</div>
    <div class="topbar-logo-sub">MW4 INTEL HUB</div>
  </div>

  <nav class="topbar-nav" role="navigation" aria-label="Main navigation">
    <button class="nav-tab active" onclick="navTo('intel', this)">INTEL FEED</button>
    <button class="nav-tab"        onclick="navTo('leaks', this)">LEAK TRACKER</button>
    <button class="nav-tab"        onclick="navTo('weapons', this)">WEAPONS DB</button>
    <button class="nav-tab"        onclick="navTo('impressions', this)">FIRST IMPRESSIONS</button>
    <button class="nav-tab"        onclick="navTo('fragcast', this)">FRAGCAST</button>
    <button class="nav-tab"        onclick="navTo('serverstatus', this)">SERVER STATUS</button>
    <button class="nav-tab"        onclick="navTo('tierlist', this)">TIER LIST</button>
    <button class="nav-tab"        onclick="navTo('patchnotes', this)">PATCH NOTES</button>
    <button class="nav-tab"        onclick="navTo('dossier', this)" id="nav-dossier">DOSSIER</button>
  </nav>

  <div class="topbar-right">
    <span class="callsign-badge" id="topbar-callsign">
      <span class="spinner" style="width:10px;height:10px;border-width:1px;"></span>
    </span>
    <button class="btn btn-ghost" onclick="handleSignOut()">GO DARK</button>
  </div>
</header>

<main class="app-main">

  <div class="page active" id="page-intel">
    <div id="intel-content">
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--bone-dim);
                  letter-spacing:2px;padding:2rem 0;text-align:center;">
        <span class="spinner"></span>
      </div>
    </div>
  </div>

  <div class="page" id="page-leaks">
    <div id="leaks-content"></div>
  </div>

  <div class="page" id="page-weapons">
    <div id="weapons-content"></div>
  </div>

  <div class="page" id="page-impressions">
    <div id="impressions-content"></div>
  </div>

  <div class="page" id="page-fragcast">
    <div id="fragcast-content"></div>
  </div>

  <div class="page" id="page-serverstatus">
    <div id="serverstatus-content"></div>
  </div>

  <div class="page" id="page-tierlist">
    <div id="tierlist-content"></div>
  </div>

  <div class="page" id="page-patchnotes">
    <div id="patchnotes-content"></div>
  </div>

  <div class="page" id="page-dossier">
    <div id="dossier-content"></div>
  </div>

  <div class="phase-strip">
    <span class="phase-badge phase-active">PHASE 01 — PRE-LAUNCH</span>
    <span class="phase-badge phase-locked">PHASE 02 — LAUNCH WEEK [LOCKED]</span>
    <span class="phase-badge phase-locked">PHASE 03 — LIVE GAME [LOCKED]</span>
  </div>

</main>

<div id="toast-container" aria-live="polite"></div>

<script src="js/config.js"></script>
<script src="js/xhr.js"></script>
<script src="js/auth.js"></script>
<script src="js/countdown.js"></script>
<script src="js/intel.js"></script>
<script src="js/leaks.js"></script>
<script src="js/votes.js"></script>
<script src="js/impressions.js"></script>
<script src="js/fragcast.js"></script>
<script src="js/serverstatus.js"></script>
<script src="js/tierlist.js"></script>
<script src="js/patchnotes.js"></script>
<script src="js/dossier.js"></script>

<script>
  let currentUser = null;
  let currentPage = 'intel';

  window.addEventListener('DOMContentLoaded', async function () {
    // Catch Google OAuth token in URL hash
    await handleOAuthCallback();

    // Guard — redirect if not logged in
    if (!requireAuth()) return;

    // Load profile from DB
    currentUser = await fetchCurrentUser();
    await checkCallsignSetup();

    // Fallback: pull callsign from session user_metadata if DB fetch failed
    if (!currentUser) {
      const session = getSession();
      const meta = session && session.user && session.user.user_metadata;
      if (meta && meta.callsign) {
        currentUser = { callsign: meta.callsign, role: 'operative', id: session.user.id };
      }
    }

    if (currentUser) {
      document.getElementById('topbar-callsign').textContent = currentUser.callsign;

      // Show Command link for admins
      if (currentUser.role === 'admin' || currentUser.role === 'command') {
        const a = document.createElement('a');
        a.href = '/admin/';
        a.className = 'nav-tab';
        a.style.color = 'var(--gold)';
        a.textContent = 'COMMAND';
        document.querySelector('.topbar-nav').appendChild(a);
      }
    }

    loadPage('intel');
  });

  // ── Page router ──────────────────────────────────────────

  function navTo(pageId, tabEl) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    if (tabEl) tabEl.classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + pageId).classList.add('active');
    currentPage = pageId;
    loadPage(pageId);
  }

  function loadPage(pageId) {
    switch (pageId) {
      case 'intel':    loadIntelPage();    break;
      case 'leaks':    loadLeaksPage();    break;
      case 'weapons':  loadWeaponsPage();  break;
      case 'impressions': loadImpressionsPage(); break;
      case 'fragcast':    loadFragcastPage();    break;
      case 'serverstatus': loadServerStatusPage(); break;
      case 'tierlist':     loadTierListPage();     break;
      case 'patchnotes':  loadPatchNotesPage();  break;
      case 'dossier':     loadDossierPage();     break;
    }
  }

  // ── Google OAuth new user — callsign setup modal ─────────

  function showCallsignSetup() {
    document.querySelector('.app-main').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;
                  min-height:60vh;padding:1rem;">
        <div class="card card-top" style="max-width:400px;width:100%;">
          <div class="card-header">
            <div class="card-title">CHOOSE YOUR CALLSIGN</div>
          </div>
          <p style="font-family:var(--font-mono);font-size:10px;color:var(--bone-dim);
                    letter-spacing:1px;margin-bottom:1rem;line-height:1.6;">
            GOOGLE AUTH SUCCESSFUL. ASSIGN YOUR OPERATIVE DESIGNATION.
          </p>
          <div class="error-msg" id="callsign-setup-error"></div>
          <div class="field-group">
            <label class="field-label" for="new-callsign">CALLSIGN</label>
            <input class="mil-input" type="text" id="new-callsign"
                   placeholder="E.G. GHOST_OPS" maxlength="24" autocomplete="off"
                   oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9_\\-]/g,'')">
          </div>
          <button class="btn btn-primary btn-full" id="btn-set-callsign"
                  onclick="submitCallsignSetup()">
            CONFIRM CALLSIGN
          </button>
        </div>
      </div>`;
  }

  async function submitCallsignSetup() {
    const input  = document.getElementById('new-callsign');
    const errEl  = document.getElementById('callsign-setup-error');
    const btn    = document.getElementById('btn-set-callsign');
    const cs     = input.value.trim().toUpperCase();

    errEl.classList.remove('visible');

    if (!cs || cs.length < 3) {
      errEl.textContent = 'CALLSIGN MUST BE AT LEAST 3 CHARACTERS';
      errEl.classList.add('visible');
      return;
    }

    setButtonLoading(btn, 'ASSIGNING...');

    // Upsert profile with this callsign
    const session = getSession();
    const { data: userData } = await xhrRequest('GET', `${AUTH_BASE}/user`, null, {
      'Authorization': `Bearer ${session.access_token}`
    });

    if (!userData || !userData.id) {
      resetButton(btn, 'CONFIRM CALLSIGN');
      errEl.textContent = 'COULD NOT RETRIEVE USER — TRY REFRESHING';
      errEl.classList.add('visible');
      return;
    }

    // Check availability
    const { data: existing } = await xhrGet(
      'profiles', `select=id&callsign=eq.${encodeURIComponent(cs)}`
    );
    if (existing && existing.length > 0) {
      resetButton(btn, 'CONFIRM CALLSIGN');
      errEl.textContent = `CALLSIGN "${cs}" IS ALREADY TAKEN`;
      errEl.classList.add('visible');
      return;
    }

    const { error } = await xhrRequest('POST', `${API_BASE}/profiles`, {
      id: userData.id,
      callsign: cs
    });

    if (error) {
      resetButton(btn, 'CONFIRM CALLSIGN');
      errEl.textContent = 'FAILED TO SET CALLSIGN — TRY AGAIN';
      errEl.classList.add('visible');
      return;
    }

    invalidateProfileCache();
    window.location.reload();
  }
</script>

</body>
</html>
