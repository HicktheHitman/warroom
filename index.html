<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CALLSIGN: WARROOM — Access Restricted</title>
  <meta name="description" content="MW4 community intel hub. Confirmed intel, leak tracker, field reports.">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>

<div class="login-screen">
  <div class="login-grid-bg"></div>
  <div class="login-scan"></div>
  <div class="login-corner tl"></div>
  <div class="login-corner tr"></div>
  <div class="login-corner bl"></div>
  <div class="login-corner br"></div>

  <div class="access-banner">ACCESS RESTRICTED</div>

  <div class="login-logo">
    CALLSIGN: WARROOM
    <span class="login-logo-sub">warroom.gg</span>
  </div>

  <div class="classified-tag">CLASSIFIED — AUTHORIZED PERSONNEL ONLY</div>

  <!-- ── Sign In Form ── -->
  <div class="login-box" id="form-signin">
    <div class="error-msg" id="signin-error"></div>

    <div class="field-group">
      <label class="field-label" for="signin-email">CALLSIGN / EMAIL</label>
      <input class="mil-input" type="email" id="signin-email"
             placeholder="OPERATIVE@DOMAIN.COM" autocomplete="email">
    </div>
    <div class="field-group">
      <label class="field-label" for="signin-password">AUTHORIZATION CODE</label>
      <input class="mil-input" type="password" id="signin-password"
             placeholder="••••••••••••" autocomplete="current-password">
    </div>

    <button class="btn btn-primary btn-full" id="btn-signin" onclick="handleSignIn()">
      AUTHENTICATE
    </button>

    <div style="margin-top: 8px;">
      <button class="btn btn-secondary btn-full" onclick="showForm('signup')">
        REQUEST CLEARANCE
      </button>
    </div>

    <div class="divider">OR</div>

    <button class="btn btn-secondary btn-full" id="btn-google" onclick="handleGoogleAuth()"
            style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; gap: 8px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      AUTHENTICATE VIA GOOGLE
    </button>
  </div>

  <!-- ── Sign Up Form ── -->
  <div class="login-box hidden" id="form-signup">
    <div class="error-msg" id="signup-error"></div>

    <div class="field-group">
      <label class="field-label" for="signup-callsign">CHOOSE YOUR CALLSIGN</label>
      <input class="mil-input" type="text" id="signup-callsign"
             placeholder="E.G. GHOST_OPS" maxlength="24"
             pattern="[A-Za-z0-9_\-]+" autocomplete="off">
      <div style="font-family: var(--font-mono); font-size: 9px; color: var(--bone-dim);
                  margin-top: 5px; letter-spacing: 0.5px;">
        Letters, numbers, _ and - only. No spaces.
      </div>
    </div>
    <div class="field-group">
      <label class="field-label" for="signup-email">EMAIL</label>
      <input class="mil-input" type="email" id="signup-email"
             placeholder="OPERATIVE@DOMAIN.COM" autocomplete="email">
    </div>
    <div class="field-group">
      <label class="field-label" for="signup-password">AUTHORIZATION CODE</label>
      <input class="mil-input" type="password" id="signup-password"
             placeholder="MIN 8 CHARACTERS" autocomplete="new-password">
    </div>

    <button class="btn btn-primary btn-full" id="btn-signup" onclick="handleSignUp()">
      REQUEST CLEARANCE
    </button>
    <div style="margin-top: 8px;">
      <button class="btn btn-secondary btn-full" onclick="showForm('signin')">
        ← BACK TO AUTHENTICATE
      </button>
    </div>
  </div>

  <!-- ── Email confirmation message ── -->
  <div class="login-box hidden" id="form-confirm">
    <div style="text-align: center; padding: 0.5rem 0;">
      <div style="font-family: var(--font-mil); font-size: 11px; color: var(--olive-glow);
                  letter-spacing: 3px; margin-bottom: 0.75rem;">
        CLEARANCE REQUESTED
      </div>
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--bone-muted);
                  line-height: 1.6; letter-spacing: 0.5px;">
        Check your email to confirm your account.<br>
        Once confirmed, return to authenticate.
      </div>
      <button class="btn btn-secondary" style="margin-top: 1rem;" onclick="showForm('signin')">
        BACK TO AUTHENTICATE
      </button>
    </div>
  </div>

  <div class="login-footer">
    DEVELOPED BY HICKTHEHITMAN &amp; ZANGETSU
  </div>
</div>

<!-- Toast container -->
<div id="toast-container" aria-live="polite"></div>

<script src="js/config.js"></script>
<script src="js/xhr.js"></script>
<script src="js/auth.js"></script>

<script>
  // Redirect to dashboard if already logged in
  window.addEventListener('DOMContentLoaded', function () {
    const session = getSession();
    if (session && session.access_token) {
      window.location.href = '/dashboard.html';
    }
  });

  function showForm(name) {
    document.getElementById('form-signin').classList.add('hidden');
    document.getElementById('form-signup').classList.add('hidden');
    document.getElementById('form-confirm').classList.add('hidden');
    document.getElementById('form-' + name).classList.remove('hidden');
  }
</script>

</body>
</html>
